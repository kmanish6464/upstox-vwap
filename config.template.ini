[TELEGRAM]
bot_token        = YOUR_TELEGRAM_BOT_TOKEN
chat_id          = YOUR_CHAT_ID
channel_id       = @YOUR_CHANNEL
enable_telegram  = False

[UPSTOX]
token_file           = token.txt
Buy_instrument_key   = NSE_FO|XXXXX      ; CE option instrument key
Sell_instrument_key  = NSE_FO|XXXXX      ; PE option instrument key
Nifty_futures_key    = NSE_FO|XXXXX      ; Nifty current month futures key (update every expiry)
vix_key              = NSE_INDEX|India VIX

[SETTINGS]
; Candle timeframe: 1minute | 3minute | 5minute | 15minute | 30minute
timeframe       = 5minute
loop_interval   = 15              ; poll interval in seconds (live mode)
lot_size        = 25              ; Nifty lot size
slippage_pct    = 0.0005

[ZONES]
; ── No-Trade Band (e.g. around major event / lunch zone) ──
no_trade_upper  = 24100
no_trade_lower  = 23900

; ── Hard limits — never trade beyond these ──
upper_limit     = 24500
lower_limit     = 23500

; ── Key Levels ──
; No BUY_CALL at/above R1 or R2
r1              = 23992
r2              = 24150

; No BUY_PUT at/below S1 or S2
s1              = 23885
s2              = 23700

; Proximity buffer (points) — treat price within ±buffer as "at level"
level_buffer    = 15

[BACKTEST]
; Set date range for backtest mode
from_date       = 2025-04-01
to_date         = 2025-04-30

[LIVE_TRADING]
; ── DANGER: set to True ONLY after paper testing ──
enable_live_orders   = False
product_type         = I          ; I=Intraday  D=Delivery/Carryforward
trade_qty_call       = 25         ; CE option quantity
trade_qty_put        = 25         ; PE option quantity
auto_squareoff_time  = 15:20      ; auto exit all positions HH:MM IST
max_daily_loss_rs    = 5000       ; circuit-breaker ₹ loss limit (0=disabled)
order_retry          = 2          ; order API retry attempts
position_sync_every  = 3          ; re-verify positions with broker every N candles
